name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch:
  push:
    branches:
    - main

# Permissões necessárias para que a Action possa fazer o push dos arquivos
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera os arquivos SVG da cobrinha
      - name: generate-snake-svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wellingtonspdev
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?color_snake=#7845ab&color_dots=#161b22,#42107d,#6327af,#8144d6,#9e67ea

      # Faz o push dos arquivos gerados para a branch 'output'
      - name: push-snake-svg-to-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
