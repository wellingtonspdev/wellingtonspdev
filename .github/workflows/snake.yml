name: Generate Snake

on:
  schedule:
    # Roda a cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Gera a cobrinha baseada no seu grafo de contribuições
      - uses: Platane/snk@v2
        id: snake-gif
        with:
          github_user_name: wellingtonspdev
          # Gera tanto o SVG (light/dark) quanto um GIF
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?color_snake=#7845ab&color_dots=#313131,#121212,#e9ecef,#ced4da
            dist/github-contribution-grid-snake.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publica o arquivo .svg gerado na branch de output
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
