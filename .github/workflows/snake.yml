name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" # Execução a cada 12 horas para eficiência de recursos
  workflow_dispatch: # Permite execução manual para testes
  push:
    branches:
    - main

# Princípio de Privilégio Mínimo: concede apenas escrita de conteúdo
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera os SVGs baseados no seu perfil (wellingtonspdev)
      - name: generate-snake-svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wellingtonspdev
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?color_snake=#7845ab&color_dots=#161b22,#42107d,#6327af,#8144d6,#9e67ea

      # Deploy dos ativos gerados na branch 'output'
      - name: push-snake-svg-to-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
